# HeuristiX Configuration
amure_do:
  url: "http://localhost:9090"
  timeout: 30

llm:
  provider: "claude_cli"  # or openai, ollama, etc.
  model: ""
  api_key: ""
  temperature: 0.7

evolution:
  population_size: 10
  generations: 30
  tournament_size: 3
  mutation_rate: 0.7
  crossover_rate: 0.3
  elitism: 2  # top N carried to next gen

evaluation:
  cascade: true
  quick_instances: ["ft06"]
  full_instances: ["ft06", "ft10", "ft20"]
  timeout_per_instance: 30  # seconds

  metrics:
    primary: "makespan"
    secondary: ["flowtime", "utilization"]
    weights:
      makespan: 1.0
      flowtime: 0.3
      utilization: 0.2

knowledge:
  distill_every: 1  # every N generations
  top_k_compare: 3
  bottom_k_compare: 3
  maturity_threshold: 3  # N validations for Mature

problem:
  name: "jssp"
  # Taillard benchmark instances
