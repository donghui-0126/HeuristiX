# HeuristiX Configuration
amure_do:
  url: "http://localhost:9090"
  timeout: 30

llm:
  default:
    provider: "openai"
    model: "gpt-4o-mini"
    api_key: ""  # Set via OPENAI_API_KEY env var or here
    temperature: 0.7

  roles:
    mutation:
      provider: "openai"
      model: "gpt-4o-mini"
      temperature: 0.8  # higher creativity for mutations
    crossover:
      provider: "openai"
      model: "gpt-4o"
      temperature: 0.6
    reflection:
      provider: "openai"
      model: "gpt-4o"
      temperature: 0.3  # lower for analytical tasks
    distillation:
      provider: "openai"
      model: "gpt-4o"
      temperature: 0.3
    init:
      provider: "openai"
      model: "gpt-4o"
      temperature: 0.9  # highest creativity for initial population

evolution:
  population_size: 10
  generations: 30
  tournament_size: 3
  mutation_rate: 0.7
  crossover_rate: 0.3
  elitism: 2

evaluation:
  cascade: true
  quick_instances: ["ft06"]
  full_instances: ["ft06", "ft10", "ft20"]
  timeout_per_instance: 30

  metrics:
    primary: "makespan"
    secondary: ["flowtime", "utilization"]
    weights:
      makespan: 1.0
      flowtime: 0.3
      utilization: 0.2

knowledge:
  distill_every: 1
  top_k_compare: 3
  bottom_k_compare: 3
  maturity_threshold: 3

  # amure-db edge mapping for HeuristiX
  edge_mapping:
    evolution_lineage: "DerivedFrom"    # parent heuristic → child heuristic
    insight_supports: "Support"          # insight → claim (supports)
    insight_rebuts: "Rebut"             # failure insight → claim (rebuts)
    strategy_refines: "Refines"          # improved strategy → base strategy
    strategy_depends: "DependsOn"        # strategy depends on condition
    strategy_contradicts: "Contradicts"  # contradictory strategies

problem:
  name: "jssp"
